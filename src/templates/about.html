<div class="container"> 
    <!-- Start mission and vision  Section -->
    <section id="service" class="service" >
        <h3 style="font-size:40px;font-weight: bold;color:#3e4095;margin-top:40px " class="{{lang=='ar'?'text-right':''}}"> <span class="border-heading"></span> <span tr="about.about_cbs"></span></h3>
        <p class="lead" style="font-size:18px;color: #595959;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif" tr="about.about_full"> </p>
        <div class="row">
            <div class="col-sm-6 col-md-4 col-xs-12  d-flex align-items-stretch" ng-repeat="vision in ourVision"  style="margin-bottom: 20px;margin-top: 20px">
                <div class="icon-box text-center"  style="box-shadow: 0 0 20px #ddd">
                    <i class="fa fa-eye fa-5x" style="color: #3e4095; margin-bottom:15px"></i>
                    <h2 style="color:#3e4095" tr="about.vision"></h2>
                    <p style="font-size: 15px;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif; color:#595959">{{vision.Vision}}</p>
                </div>
            </div>

            <div class="col-sm-6 col-md-4 col-xs-12 d-flex align-items-stretch mt-4 mt-md-0" ng-repeat="mission in ourMissions"  style="margin-bottom: 20px;margin-top: 20px">
                <div class="icon-box text-center"  style="box-shadow: 0 0 20px #ddd">
                    <i class="fa fa-file fa-5x" style="color: #3e4095; margin-bottom:15px"></i>
                    <h2  style="color:#3e4095" tr="about.mission"></h2>
                    <p style="font-size: 15px;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif;color:#595959">{{mission.mission}}</p>
                </div>
            </div>
            <div class="col-sm-3 hidden-md hidden-lg hidden-xs"></div>
            <div class="col-sm-6 col-md-4 col-xs-12 d-flex align-items-stretch mt-4 mt-lg-0"  style="margin-bottom: 20px;margin-top: 20px">
                <div class="icon-box text-center"  style="box-shadow: 0 0 20px #ddd" ng-init="hiddens=true">
                    <i class="fa fa-bullseye fa-5x" style="color: #3e4095; margin-bottom:15px"></i>
                    <h2  style="color:#3e4095" tr="about.goals"></h2>
                    <div  id="{{hiddens?'':'style-1'}}" class="scrollbar" style="height: 230px;overflow-y:{{ hiddens?'hidden':'scroll'}}">
                    <ul id="contentscroll2" class="list-group force-overflow">
                        <li class="list-group-item hidden-xs" ng-if="hiddens" ng-repeat="c in goal.slice(0,4)" style="border:none; color:#595959;text-align:center;font-size: 15px;padding:0;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif;">{{c}}</li>
                        <li class="list-group-item hidden-sm hidden-md hidden-lg" ng-repeat="c in goal.slice(0,6)" style="border:none; color:#595959;text-align:center;font-size: 15px;padding:0;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif;">{{c}}</li>
                        <li class="list-group-item " ng-if="!hiddens" ng-repeat="c in goal" style="border:none; color:#595959;text-align:center;font-size: 15px;padding: 0;font-family: 'gotham-rounded, helvetica neue, helvetica', sans-serif;">{{c}}</li>
                    </ul>
                    </div>
                </div>
            </div>
            <div class="col-sm-3 hidden-md hidden-lg hidden-xs"></div>
        </div>
    </section>
    <!-- End mission and vision  Section -->
</div>


<!-- start Section manger-->
<div class="managers text-center">
    <div class="manager-overlay">
        <div class="container">
            <div class="row">
                <!-- Start Section Boos-->
                <div class="col-xs-12" ng-repeat="person in OrganiztionChart|filter:{position_job: 'General Manager'}">
                    <div class="boss" >
                        <img src="http://smart-node.net/data/cbs/organiztion/{{person.img}}" alt="manager" class="img-circle" style="width: 150px; height: 150px;">
                        <p>{{person.name}}</p>
                        <span>{{person.position_job}}</span>
                    </div>
                </div>
                <!-- End Section Boss-->

                <!-- Start Section Boos-->
                <div class="col-xs-12 col-sm-6 col-md-6 col-lg-3" ng-repeat="person in organ|filter">
                    <div class="manager">
                        <img src="http://smart-node.net/data/cbs/organiztion/{{person.img}}" alt="manager" class="img-circle" >
                        <div class="manager-info">
                            <p>{{person.name}}</p>
                            <span>{{person.position_job}}</span>
                        </div>
                    </div>
                </div>
                <!-- End Section Boss-->

            </div>
        </div>
    </div>
</div>
<!-- end Section manger-->
