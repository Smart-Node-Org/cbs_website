<!--Start Publications  Section -->
<div class="container" ng-init="y=true;z=true">
    <h3 style="text-align: right;font-size:50px; font-weight: bold;color:#3e4095;margin-top:40px"> <span class="border-heading" style="margin-left: 10px"></span>الإصدارات</h3>
    <section  class="services"  style="position: relative;margin-top: 40px;" >
        <ul class="uk-subnav uk-subnav-pill"  uk-switcher="connect: .switcher-container" swiping="false" style="position: absolute;right: 0px;top: -60px">
            <li style="position: absolute;right: 10px;z-index: 1"><a href="#" style="text-align: right;font-size: 18px"   ng-click="y=true;z=true">الكل</a></li>
            <li style="position: absolute;right: 70px;z-index: 1"><a href="#" style="text-align: right;font-size: 18px;"   ng-click="y=true;z=true">الاقتصادية</a></li>
            <li><a href="#" style="font-size: 18px;margin-right: 160px"   ng-click="y=true;z=true">الاجتماعية</a></li>
        </ul>
        <ul class="uk-switcher switcher-container uk-margin uk-grid" style="margin-top: 80px!important;">
            <!-- Start All-->

            <div style="height: 550px;" class="uk-position-relative uk-visible-toggle uk-light "   tabindex="-1" uk-slider Autoplay="true" >
                <li>
                    <div class="row">
                        <ul class="uk-slider-items " style="height: 490px !important;">
                            <li   ng-repeat="publication in Allpublications.slice(-8)" class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
                                <div class="icon-box" style="height: 500px;width: 100%; background-color: #eeeeee">
                                    <div class="uk-inline-clip uk-transition-toggle" tabindex="0" style="width: 100%!important;">
                                        <img class="uk-transition-scale-up uk-transition-opaque " src="http://smart-node.net/data/cbs/publications/{{publication.img}}" style="border-radius: 15px;width:100%;height: 300px" class="centerPublicationImage">
                                    </div>
                                    <div class="text-center" style="margin-top: 20px" >
                                        <span style="color: #3e4095!important; font-size: 18px; font-weight: bold" >{{publication.title_ar}}</span>
                                    </div>
                                    <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom" style="position: absolute;right:30px;bottom:30px; margin-right: 8px;margin-top:100px ;background: #3e4095;width: 30px; height:30px; line-height: 30px;text-align: center; border-radius: 50%;">
                                        <i class="fa fa-eye" aria-hidden="true" ></i>
                                    </a>
                                    <a ng-click="download(publication)" style="position: absolute;left:30px;bottom:30px;margin-top:100px;margin-right: 20px ; background-color: #3e4095;width: 30px;color: #ffffdd; height: 30px; line-height: 30px;text-align: center; border-radius: 50%;" uk-tooltip="title:Download {{publication.title}} publication;pos:bottom">
                                        <i class="fa fa-arrow-circle-down" ></i>
                                    </a>
                                </div>
                            </li>
                        </ul>

                    </div>
                </li>
                <a class="uk-position-bottom-left uk-position-small hidden-xs hidden-sm hidden-md"  uk-slidenav-previous uk-slider-item="previous" style="background-color: #3e4095; border-radius: 50%; color: #ffffff; left: 450px; bottom: -10px"></a>
                <a class="uk-position-bottom-right uk-position-small hidden-xs hidden-sm hidden-md"  uk-slidenav-next uk-slider-item="next" style="background-color: #3e4095; border-radius: 50%; color: #ffffff; right: 430px; bottom: 7px"></a>

            </div>

            <!-- End All-->
            <!-- Start Economic  ng-repeat="publication in Allpublications|filter:{department:department.id}"   -->
            <div style="height: 550px" class="uk-position-relative uk-visible-toggle uk-light"   tabindex="-1" uk-slider Autoplay="true" ng-repeat="department in AllDepartment">
                <li>
                    <div class="row">
                        <ul class="uk-slider-items" style="height: 490px !important;">
                            <li  ng-repeat="publication in Allpublications.slice(-8)|filter:{department:department.id}" class="col-xs-12 col-sm-6 col-md-4 col-lg-3">
                                <div class="icon-box" style="height: 500px; background-color: #eeeeee">
                                    <div class="uk-inline-clip uk-transition-toggle text-center" tabindex="0" style="width: 100%!important;">
                                        <img class="uk-transition-scale-up uk-transition-opaque " src="http://smart-node.net/data/cbs/publications/{{publication.img}}" style="border-radius: 15px;width:100%;height: 300px" class="centerPublicationImage">
                                    </div>
                                    <div class="text-center" style="margin-top: 20px" >
                                        <span style="color: #3e4095!important; font-size: 18px; font-weight: bold" >{{publication.title_ar}}</span>
                                    </div>
                                    <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom" style="position: absolute;right:30px;bottom:30px; margin-right: 8px;margin-top:100px ;background: #3e4095;width: 30px; height:30px; line-height: 30px;text-align: center; border-radius: 50%;">
                                        <i class="fa fa-eye" aria-hidden="true" ></i>
                                    </a>
                                    <a ng-click="download(publication)" style="position: absolute;left:30px;bottom:30px;margin-top:100px;margin-right: 20px ; background-color: #3e4095;width: 30px;color: #ffffdd; height: 30px; line-height: 30px;text-align: center; border-radius: 50%;" uk-tooltip="title:Download {{publication.title}} publication;pos:bottom">
                                        <i class="fa fa-arrow-circle-down" ></i>
                                    </a>
                                </div>
                            </li>
                        </ul>
                    </div>
                </li>
                <a class="uk-position-bottom-left uk-position-small hidden-xs hidden-sm hidden-md"  uk-slidenav-previous uk-slider-item="previous" style="background-color: #3e4095; border-radius: 50%; color: #ffffff; left: 450px; bottom: -10px"></a>
                <a class="uk-position-bottom-right uk-position-small hidden-xs hidden-sm hidden-md"  uk-slidenav-next uk-slider-item="next" style="background-color: #3e4095; border-radius: 50%; color: #ffffff; right: 430px; bottom: 7px"></a>
            </div>

            <!-- End Economic-->

        </ul>
    </section>
</div>
<!--Start Publications  Section-->

<div class="container">
    <ul class="uk-switcher switcher-container uk-margin"  style="transform: rotate(-180deg)">
        <div   ng-switch="z" class="uk-position-relative uk-visible-toggle"   tabindex="-1" uk-slider >
            <li  ng-switch-when="true"  style="transform: rotate(-180deg);" class="list-group-item publicationPageListGroup" ng-repeat="publication in Allpublications.slice(-15)">

                <span class="fa fa-chevron-circle-left" style="transform:translateY(9px);color: #3e4095;font-size: 20px;float: right"></span> <span style="font-size:20px;float: right;margin-right: 20px"><a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}" style="margin-left: 10px;color: black;">{{publication.title_ar}}</a></span>
                <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom">
                    <i class="fa fa-eye" aria-hidden="true" style="font-size: 25px;color: #3e4095;"></i>
                </a>
                <a target="_blank" ng-click="download(publication)" uk-tooltip="title:Download {{publication.title_ar}} publication;pos:bottom" style="margin-left: 20px">
                    <i class="fa fa-arrow-down" style="font-size: 20px;color: #3e4095;"></i>
                </a>
            </li>
            <li  ng-switch-when="false"  style="transform: rotate(-180deg)" class="list-group-item publicationPageListGroup" ng-repeat="publication in Allpublications">
                <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom">
                    <i class="fa fa-eye" aria-hidden="true" style="font-size: 25px;color: #3e4095;"></i>
                </a>
                <a target="_blank" ng-click="download(publication)" uk-tooltip="title:Download {{publication.title_ar}} publication;pos:bottom" style="margin-left: 20px">
                    <i class="fa fa-arrow-down" style="font-size: 20px;color: #3e4095;"></i>
                </a>
                <span class="fa fa-chevron-circle-left" style="transform:translateY(9px);color: #3e4095;font-size: 20px;float: right"></span> <span style="font-size:20px;float: right;margin-right: 20px"><a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}" style="margin-left: 10px;color: black;">{{publication.title_ar}}</a></span>
            </li>
        </div>
        <div  ng-switch="y" class="uk-position-relative uk-visible-toggle"   tabindex="-1" uk-slider ng-repeat="department in AllDepartment">
            <li  ng-switch-when="true"  style="transform: rotate(-180deg);" class="list-group-item publicationPageListGroup" ng-repeat="publication in Allpublications.slice(-15)|filter:{department:department.id}">
                <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom">
                    <i class="fa fa-eye" aria-hidden="true" style="font-size: 25px;color: #3e4095;"></i>
                </a>
                <a target="_blank" ng-click="download(publication)" uk-tooltip="title:Download {{publication.title_ar}} publication;pos:bottom" style="margin-left: 20px">
                    <i class="fa fa-arrow-down" style="font-size: 20px;color: #3e4095;"></i>
                </a>
                <span class="fa fa-chevron-circle-left" style="transform:translateY(9px);color: #3e4095;font-size: 20px;float: right"></span> <span style="font-size:20px;float: right;margin-right: 20px"><a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}" style="margin-left: 10px;color: black;">{{publication.title_ar}}</a></span>
            </li>
            <li   ng-switch-when="false"  style="transform: rotate(-180deg)" class="list-group-item publicationPageListGroup" ng-repeat="publication in Allpublications|filter:{department:department.id}">
                <a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}"  uk-tooltip="title:Read {{publication.title_ar}} publication;pos:bottom">
                    <i class="fa fa-eye" aria-hidden="true" style="font-size: 25px;color: #3e4095;"></i>
                </a>
                <a target="_blank" ng-click="download(publication)" uk-tooltip="title:Download {{publication.title_ar}} publication;pos:bottom" style="margin-left: 20px">
                    <i class="fa fa-arrow-down" style="font-size: 20px;color: #3e4095;"></i>
                </a>

                <span class="fa fa-chevron-circle-left" style="transform:translateY(9px);color: #3e4095;font-size: 20px;float: right"></span> <span style="font-size:20px;float: right;margin-right: 20px"><a target="_blank" href="http://smart-node.net/data/cbs/publications/{{publication.file}}" style="margin-left: 10px;color: black;">{{publication.title_ar}}</a></span>
            </li>
        </div>
    </ul>
</div>
<div class="text-center">
    <button class="uk-button btn-primary uk-button-large" ng-click="y=!y;z=!z" style="margin-top: 20px;font-size: 15px;font-weight: bold">{{z==true?'إظهار المزيد':'أظهار أقل'}}</button>
</div>
