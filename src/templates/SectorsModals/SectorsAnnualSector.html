<mds-modal style="width: 100%;" closable>
    <mds-modal-header>
        <mds-modal-title >
            <div class="md-toolbar-tools" style="background-color: #2d3669">
                <h2 style="color: #EBF7E5"  tr="modals.SectorsAnnualTable"> </h2>
            </div>
        </mds-modal-title>
    </mds-modal-header>
    <mds-modal-body style="padding: 40px;background-color: rgb(255,255,255);">
           <div class="container-fluid">
            <label   tr="modals.ChooseSector"> </label>
            <md-select  name="type" ng-change="changeSectorAnnualYear()" ng-model="YearsOfSectorAnnual.sector_id" required>
                <md-option ng-value="{{sector.sector_id}}" ng-repeat="sector in YearsOfSectorAnnual">{{sector.title}}</md-option>
            </md-select>
        
            <table class="table table-bordered" id="AllSectorAnnualSector">
                <thead>
                <tr class="khlee">
                    <th  style="color: #ffffdd" class="medium"  tr="modals.Year"></th>
                    <th style="color: #ffffdd" class="medium"  tr="modals.Contributionrate"></th>
                    <th style="color: #ffffdd" class="medium"  tr="modals.Growthrate"></th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="annualSector in AllSectorAnnualSector">
                    <td  class="medium"style="font-weight: bold">{{annualSector.year}}</td>
                    <td  class="medium">{{annualSector.Contribution_rate}}</td>
                    <td  class="medium">{{annualSector.growth_rate}}</td>
                </tr>
                </tbody>
            </table>
        </div>
    </mds-modal-body>
</mds-modal>
